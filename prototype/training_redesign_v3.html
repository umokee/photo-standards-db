<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Обучение V3 — Photo Standards</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <style>
    .mono { font-family: var(--mono); }

    .train-kpis { display:flex; gap:18px; flex-wrap:wrap; }
    .train-kpi { display:flex; align-items:center; gap:5px; font-size:12px; color:var(--text-sub); }
    .train-kpi__val { font-family:var(--mono); font-weight:500; color:var(--text); }

    .train-layout {
      display:grid;
      grid-template-columns: minmax(0,1fr) 330px;
      gap:16px;
      align-items:start;
    }

    .train-stack,
    .queue-stack { display:flex; flex-direction:column; gap:12px; }

    .train-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      box-shadow: var(--shadow-card);
      overflow: hidden;
    }

    .train-card__body { padding: 14px; }

    .section-kicker {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-hint);
      margin-bottom: 12px;
    }

    .launch-head {
      display:grid;
      grid-template-columns: minmax(0,1fr) 190px;
      gap:12px;
      margin-bottom: 14px;
      align-items:start;
    }

    .launch-head__title {
      font-size: 18px;
      line-height: 1.05;
      letter-spacing: -.03em;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }

    .launch-head__sub {
      font-size: 12px;
      line-height: 1.65;
      color: var(--text-sub);
      max-width: 64ch;
    }

    .ready-box {
      background: var(--bg2);
      border: 1px solid var(--border-soft);
      border-radius: var(--r-lg);
      padding: 12px;
    }

    .ready-box__label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-hint);
      margin-bottom: 7px;
    }

    .ready-box__value {
      font-size: 22px;
      line-height: 1;
      font-family: var(--mono);
      color: var(--text);
      margin-bottom: 7px;
    }

    .ready-box__hint {
      font-size: 11px;
      line-height: 1.55;
      color: var(--text-sub);
    }

    .strip {
      display:flex;
      height:10px;
      overflow:hidden;
      border-radius:999px;
      background: var(--surface2);
      border:1px solid var(--border);
    }

    .strip__train { background: var(--primary); }
    .strip__val { background: var(--ml); }
    .strip__test { background: var(--amber); }

    .standards-grid {
      display:grid;
      gap:8px;
      margin-top: 14px;
    }

    .std-row {
      background: var(--bg2);
      border:1px solid var(--border-soft);
      border-radius: var(--r-lg);
      padding: 11px 12px;
    }

    .std-row__top {
      display:flex;
      justify-content:space-between;
      align-items:center;
      gap:10px;
      margin-bottom:7px;
    }

    .std-row__name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .std-row__meta {
      font-size: 11px;
      color: var(--text-hint);
    }

    .std-row__pct {
      font-size: 11px;
      font-family: var(--mono);
      color: var(--text-sub);
    }

    .std-row__hint {
      margin-top: 7px;
      font-size: 11px;
      line-height: 1.55;
      color: var(--text-hint);
    }

    .model-grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
      margin-top: 12px;
    }

    .model-card {
      padding: 11px 12px;
      border-radius: var(--r-lg);
      border:1px solid var(--border);
      background: var(--bg2);
      cursor:pointer;
      transition: var(--transition);
    }

    .model-card:hover { background: var(--surface2); }

    .model-card.selected {
      border-color: var(--ml-bd);
      background: var(--ml-bg);
      box-shadow: inset 2px 0 0 var(--ml);
    }

    .model-card__top {
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin-bottom:5px;
      align-items:start;
    }

    .model-card__name {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .model-card__sub {
      font-size: 11px;
      line-height:1.55;
      color: var(--text-sub);
    }

    .split-block {
      margin-top: 14px;
      padding: 12px;
      border-radius: var(--r-lg);
      background: var(--bg2);
      border:1px solid var(--border-soft);
    }

    .split-block__head {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:baseline;
      margin-bottom:10px;
    }

    .split-block__title {
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
    }

    .split-block__sub {
      font-size: 11px;
      color: var(--text-sub);
    }

    .slider-grid {
      display:grid;
      gap:10px;
      margin: 12px 0;
    }

    .slider-row {
      padding: 10px 11px;
      border-radius: var(--r);
      border: 1px solid var(--border);
      background: var(--surface);
    }

    .slider-row__head {
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin-bottom:8px;
      font-size:11px;
      color: var(--text-sub);
    }

    .slider-row__head span:last-child {
      font-family: var(--mono);
      color: var(--text);
    }

    .slider-row input[type="range"] {
      width:100%;
      appearance:none;
      -webkit-appearance:none;
      height:6px;
      border-radius:999px;
      background: var(--surface2);
      outline:none;
    }

    .slider-row input[type="range"]::-webkit-slider-thumb {
      appearance:none;
      -webkit-appearance:none;
      width:14px;
      height:14px;
      border-radius:50%;
      background:#fff;
      border:3px solid var(--primary);
    }

    .slider-row--val input[type="range"]::-webkit-slider-thumb { border-color: var(--ml); }

    .param-grid {
      display:grid;
      grid-template-columns: repeat(4, minmax(0,1fr));
      gap:8px;
      margin-top: 12px;
    }

    .param-box {
      padding: 10px 11px;
      border-radius: var(--r);
      border:1px solid var(--border);
      background: var(--surface);
    }

    .param-box__label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-hint);
      margin-bottom: 7px;
    }

    .param-box .field__input,
    .param-box .field__select {
      min-height: 36px;
      background: var(--bg);
      border-color: var(--border);
      color: var(--text);
    }

    .summary-box {
      margin-top: 14px;
      display:flex;
      justify-content:space-between;
      gap:12px;
      align-items:flex-start;
      border-top:1px solid var(--border-soft);
      padding-top: 12px;
    }

    .summary-box__text {
      flex:1;
      min-width:0;
      font-size: 11px;
      line-height: 1.65;
      color: var(--text-sub);
    }

    .summary-box__text strong {
      color: var(--text);
      font-weight: 600;
    }

    .summary-box__actions {
      display:flex;
      gap:8px;
      flex-wrap:wrap;
      justify-content:flex-end;
    }

    .history-list,
    .queue-list,
    .ahead-list { display:grid; gap:8px; }

    .history-item,
    .queue-item,
    .ahead-item {
      padding: 10px 11px;
      border-radius: var(--r);
      border:1px solid var(--border);
      background: var(--bg2);
    }

    .history-item__top,
    .queue-item__top,
    .ahead-item__top {
      display:flex;
      justify-content:space-between;
      gap:8px;
      margin-bottom:4px;
      align-items:start;
    }

    .history-item__title,
    .queue-item__title,
    .ahead-item__title {
      font-size: 12px;
      font-weight: 500;
      color: var(--text);
    }

    .history-item__sub,
    .queue-item__sub,
    .ahead-item__sub {
      font-size: 11px;
      line-height: 1.55;
      color: var(--text-sub);
    }

    .queue-item {
      cursor:pointer;
      transition: var(--transition);
    }

    .queue-item:hover { background: var(--surface); }
    .queue-item.selected {
      background: var(--surface2);
      box-shadow: inset 2px 0 0 var(--primary);
    }
    .queue-item.mine { box-shadow: inset 2px 0 0 var(--ml); }
    .queue-item.active { box-shadow: inset 2px 0 0 var(--amber); }

    .queue-meta {
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-top: 8px;
    }

    .queue-meta span {
      padding: 2px 6px;
      border-radius: var(--r-sm);
      background: var(--surface);
      border:1px solid var(--border);
      font-size:10px;
      color: var(--text-hint);
      font-family: var(--mono);
    }

    .mini-progress {
      margin-top: 8px;
      height: 5px;
      border-radius: 999px;
      background: var(--surface2);
      border:1px solid var(--border);
      overflow:hidden;
    }

    .mini-progress > div {
      height:100%;
      border-radius:999px;
      background: currentColor;
    }

    .queue-filters {
      display:flex;
      gap:6px;
      flex-wrap:wrap;
      margin-bottom: 10px;
    }

    .queue-filter {
      padding:4px 8px;
      border-radius: var(--r-sm);
      border:1px solid var(--border);
      background: var(--surface);
      color: var(--text-sub);
      font-size:11px;
      cursor:pointer;
    }

    .queue-filter.active {
      border-color: var(--primary-bd);
      background: var(--primary-bg);
      color: var(--primary-text);
    }

    .queue-headline {
      display:flex;
      justify-content:space-between;
      gap:10px;
      align-items:start;
      margin-bottom: 10px;
    }

    .ticket-card {
      padding: 12px;
      border-radius: var(--r-lg);
      border:1px solid var(--border);
      background: var(--surface);
    }

    .ticket-card__label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-hint);
      margin-bottom: 8px;
    }

    .ticket-card__title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }

    .ticket-card__sub {
      font-size: 11px;
      line-height: 1.55;
      color: var(--text-sub);
      margin-bottom: 10px;
    }

    .ticket-grid {
      display:grid;
      grid-template-columns: 1fr 1fr;
      gap:8px;
    }

    .ticket-metric {
      padding: 9px 10px;
      border-radius: var(--r);
      border:1px solid var(--border);
      background: var(--bg2);
    }

    .ticket-metric__label {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: .08em;
      color: var(--text-hint);
      margin-bottom: 5px;
    }

    .ticket-metric__value {
      font-size: 16px;
      line-height: 1;
      font-family: var(--mono);
      color: var(--text);
    }

    .empty-note {
      padding: 14px;
      border:1px dashed var(--border);
      border-radius: var(--r-lg);
      color: var(--text-sub);
      font-size: 11px;
      line-height: 1.65;
      background: var(--bg2);
    }

    @media (max-width: 1180px) {
      .train-layout { grid-template-columns: 1fr; }
      .param-grid { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 767px) {
      .launch-head,
      .summary-box,
      .ticket-grid,
      .content-header__top { grid-template-columns: 1fr; display:flex; flex-direction:column; }
      .param-grid,
      .model-grid { grid-template-columns: 1fr; }
      .train-kpis { gap:10px; }
    }
  </style>
</head>
<body>

<div class="app-body"><div class="split">

    <div class="sb-header">
      <div class="sb-label">Группы для обучения</div>
      <input id="groupSearch" class="sb-search" type="text" placeholder="Поиск группы...">

    <div class="sb-list" id="groupList"></div>
    <div class="sb-footer">

  <main class="split__content">
    <div class="content-header">
      <div class="content-header__top">
        <div>

        </div>
        <div class="content-actions">
          <button class="btn btn--ghost btn--sm" data-action="advanceQueue">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M5 12h14"/><path d="M13 5l7 7-7 7"/></svg>

          <button class="btn btn--ghost btn--sm" id="cancelBtn" data-action="cancelMine">Снять</button>

      </div>
      <div class="train-kpis" id="contentKpis"></div>
    </div>

    <div class="split__body">
      <div class="train-layout">
        <div class="train-stack">
          <section class="train-card">
            <div class="train-card__body" id="launchPanel"></div>
          </section>
          <section class="train-card">
            <div class="train-card__body" id="historyPanel"></div>
          </section>

        <aside class="queue-stack">
          <section class="train-card">
            <div class="train-card__body" id="currentPanel"></div>
          </section>
          <section class="train-card">
            <div class="train-card__body" id="myTaskPanel"></div>
          </section>
          <section class="train-card">
            <div class="train-card__body" id="queuePanel"></div>
          </section>
        </aside>
      </div>
    </div>
  </main>

  function dismissToast(el) {
    if (!el || el.classList.contains("out")) return;

  function groupStatus(group) {
    const percent = Math.round(group.annotated / Math.max(1, group.images) * 100);
    if (percent >= 85) return { tone: "primary", label: "готово", percent };
    if (percent >= 70) return { tone: "amber", label: "почти", percent };
    return { tone: "ml", label: "сыровато", percent };
  }

  function splitCounts(total) {
    const train = Math.floor(total * STATE.trainRatio / 100);
    const val = Math.floor(total * STATE.valRatio / 100);
    const test = Math.max(0, total - train - val);
    return { train, val, test, total };
  }

  function estimateMinutes(group = selectedGroup(), model = selectedModel(), params = STATE) {
    const base = group.annotated / 14;
    const epochFactor = params.epochs / 100;
    const batchFactor = 12 / Math.max(1, params.batch);
    const imgszFactor = params.imgsz / 640;
    return Math.max(8, Math.round(base * model.factor * epochFactor * batchFactor * imgszFactor));
  }

  function liveTasks() {
    return TASKS.filter((task) => !["completed", "cancelled"].includes(task.status)).sort((a, b) => a.order - b.order);
  }

  function activeTask() {
    return liveTasks().find((task) => ["preparing", "training", "saving"].includes(task.status)) || null;
  }

  function myTask() {
    return liveTasks().find((task) => task.userId === STATE.userId) || null;
  }

  function selectedTask() {
    const live = liveTasks();
    let task = live.find((item) => item.id === STATE.selectedTaskId);
    if (!task) {

      STATE.selectedTaskId = task ? task.id : null;
    }
    return task;
  }

  function tasksAhead(task) {
    const live = liveTasks();
    const index = live.findIndex((item) => item.id === task.id);
    return index <= 0 ? [] : live.slice(0, index);
  }

  function remainingMinutes(task) {
    if (task.status === "pending") return task.estimatedMinutes;
    if (task.status === "preparing") return 3;
    if (task.status === "saving") return 2;
    if (task.status === "training") return Math.max(3, Math.round(task.estimatedMinutes * (100 - task.progress) / 100));
    return 0;
  }

  function minutesToClock(minutes) {

  }

  function archiveCompletedTask(task) {
    const group = groupById(task.groupId);
    if (!group) return;
    group.history = group.history.map((entry) => ({ ...entry, state: "archive" }));
    group.history.unshift({
      version: nextVersion(group),
      modelId: task.modelId,
      date: "сейчас",
      map: (0.89 + Math.random() * 0.06).toFixed(3),
      state: "active"

  }

    TASKS = TASKS.filter((task) => task.id !== mine.id);
    showToast("Личная задача снята из очереди.");

  function startNextPending() {
    const next = liveTasks().find((task) => task.status === "pending");
    if (!next) return;
    next.status = "preparing";
    next.progress = 16;
    next.stage = "Сбор датасета";
    if (next.userId === STATE.userId) showToast("Ваша задача заняла слот GPU.");
  }

  function advanceQueue() {
    const active = activeTask();

    if (!active) {
      startNextPending();
      renderAll();
      return;
    }

    if (active.status === "preparing") {
      active.progress += 42;
      if (active.progress >= 100) {
        active.status = "training";
        active.progress = 8;
        active.stage = `Epoch 1 / ${active.epochs}`;
      }
      renderAll();
      return;
    }

    if (active.status === "training") {
      const step = 7 + Math.random() * 8;
      active.progress = Math.min(100, active.progress + step);
      const epochNow = Math.min(active.epochs, Math.max(1, Math.round(active.epochs * active.progress / 100)));
      active.stage = `Epoch ${epochNow} / ${active.epochs}`;
      if (active.progress >= 100) {
        active.status = "saving";
        active.progress = 22;
        active.stage = "Сохранение best.pt";
      }
      renderAll();
      return;
    }

    if (active.status === "saving") {
      active.progress += 55;
      if (active.progress >= 100) {
        archiveCompletedTask(active);
        if (active.userId === STATE.userId) showToast("Обучение завершено, новая версия появилась в истории.");
        TASKS = TASKS.filter((task) => task.id !== active.id);
        startNextPending();
      }
      renderAll();
    }
  }

      <div class="ticket-card">
        <div class="ticket-card__label">Моя задача</div>
        <div class="ticket-card__title">${groupById(mine.groupId).name}</div>
        <div class="ticket-card__sub">
          ${mine.status === "pending"
            ? `Сейчас задача ждёт своей очереди. Именно здесь пользователь должен видеть честную позицию и ожидаемое время старта.`
            : "Задача уже выполняется в активном слоте GPU."}
        </div>
        <div class="ticket-grid">
          <div class="ticket-metric">
            <div class="ticket-metric__label">${mine.status === "pending" ? "Позиция" : "Статус"}</div>
            <div class="ticket-metric__value">${mine.status === "pending" ? `#${liveTasks().findIndex((item) => item.id === mine.id) + 1}` : mine.status}</div>
          </div>
          <div class="ticket-metric">
            <div class="ticket-metric__label">${mine.status === "pending" ? "ETA" : "Остаток"}</div>
            <div class="ticket-metric__value">${mine.status === "pending" ? minutesToClock(wait) : `${remainingMinutes(mine)}m`}</div>
          </div>
        </div>
        ${mine.status === "pending"
          ? `<div class="ahead-list" style="margin-top:12px">
              ${ahead.length ? ahead.map((task, index) => `
                <div class="ahead-item">
                  <div class="ahead-item__top">
                    <div class="ahead-item__title">#${index + 1} · ${groupById(task.groupId).name}</div>
                    <span class="badge ${task.status === "pending" ? "badge--ghost" : "badge--amber"}">${task.status}</span>
                  </div>
                  <div class="ahead-item__sub">${modelById(task.modelId).label} · остаток примерно ${remainingMinutes(task)} минут</div>
                </div>
              `).join("") : '<div class="empty-note">Перед вашей задачей никого нет. Она следующая на запуск.</div>'}
            </div>`
          : ""}
      </div>
    `;
  }

  function renderQueuePanel() {
    const tasks = filteredQueueTasks();
    byId("queuePanel").innerHTML = `
      <div class="queue-headline">
        <div>
          <div class="section-kicker" style="margin-bottom:6px">Очередь</div>
          <div class="content-sub">Компактный список без лишних экранов: видно кто едет сейчас, кто ждёт и где стоит выбранная группа.</div>
        </div>
        <span class="badge badge--ghost">${tasks.length}</span>
      </div>

      <div class="queue-filters">
        <button class="queue-filter ${STATE.queueView === "all" ? "active" : ""}" data-view="all">Все</button>
        <button class="queue-filter ${STATE.queueView === "mine" ? "active" : ""}" data-view="mine">Мои</button>
        <button class="queue-filter ${STATE.queueView === "group" ? "active" : ""}" data-view="group">Группа</button>
      </div>

      <div class="queue-list">
        ${tasks.length ? tasks.map((task) => {
          const position = liveTasks().findIndex((item) => item.id === task.id) + 1;
          const statusTone = task.userId === STATE.userId ? "badge--ml" : task.status === "pending" ? "badge--ghost" : "badge--amber";
          const eta = task.status === "pending"
            ? minutesToClock(tasksAhead(task).reduce((sum, item) => sum + remainingMinutes(item), 0))
            : `${remainingMinutes(task)}m`;
          const color = task.userId === STATE.userId ? "var(--ml)" : task.status === "pending" ? "rgba(138,146,128,.8)" : "var(--amber)";
          return `
            <div class="queue-item ${task.id === STATE.selectedTaskId ? "selected" : ""} ${task.userId === STATE.userId ? "mine" : ""} ${["preparing","training","saving"].includes(task.status) ? "active" : ""}" data-task="${task.id}">
              <div class="queue-item__top">
                <div class="queue-item__title">#${position} · ${groupById(task.groupId).name}</div>
                <span class="badge ${statusTone}">${task.userId === STATE.userId ? "mine" : task.status}</span>
              </div>
              <div class="queue-item__sub">${modelById(task.modelId).label} · ${task.stage}</div>
              <div class="queue-meta">
                <span>${task.epochs} ep</span>
                <span>${task.batch} batch</span>
                <span>${task.imgsz}px</span>
                <span>${task.owner}</span>
                <span>${eta}</span>
              </div>
              <div class="mini-progress" style="color:${color}"><div style="width:${task.status === "pending" ? 8 : task.progress}%"></div></div>
            </div>
          `;
        }).join("") : '<div class="empty-note">По этому фильтру задач сейчас нет.</div>'}
      </div>
    `;
  }

  function renderAll() {
    renderSidebar();
    renderHeader();
    renderLaunchPanel();
    renderHistoryPanel();
    renderCurrentPanel();
    renderMyTaskPanel();
    renderQueuePanel();
  }

  function startAutoplayIfNeeded() {
    if (STATE.autoplay && !schedulerTimer) startAutoplay();
  }

  function handleClick(event) {
    const sidebarGroup = event.target.closest("[data-group]");
    if (sidebarGroup) {
      STATE.selectedGroupId = sidebarGroup.dataset.group;
      renderAll();
      return;
    }

    const model = event.target.closest("[data-model]");
    if (model) {
      STATE.selectedModelId = model.dataset.model;
      renderLaunchPanel();
      return;
    }

    const queueItem = event.target.closest("[data-task]");
    if (queueItem) {
      STATE.selectedTaskId = queueItem.dataset.task;
      renderQueuePanel();
      renderMyTaskPanel();
      return;
    }

    const filter = event.target.closest("[data-view]");
    if (filter) {
      STATE.queueView = filter.dataset.view;
      renderQueuePanel();
      return;
    }

    const actionButton = event.target.closest("[data-action]");
    if (!actionButton) return;
    const action = actionButton.dataset.action;
    if (action === "launchMine") enqueueMine();
    if (action === "cancelMine") cancelMine();
    if (action === "advanceQueue") advanceQueue();
    if (action === "toggleAutoplay") toggleAutoplay();
  }

  function handleInput(event) {
    if (event.target.id === "groupSearch") {
      STATE.groupSearch = event.target.value || "";
      renderSidebar();
      return;
    }

    if (event.target.id === "trainRange") {
      STATE.trainRatio = Number(event.target.value);
      if (STATE.trainRatio + STATE.valRatio > 95) STATE.valRatio = 95 - STATE.trainRatio;
      renderLaunchPanel();
      return;
    }

    if (event.target.id === "valRange") {
      STATE.valRatio = Number(event.target.value);
      if (STATE.trainRatio + STATE.valRatio > 95) STATE.valRatio = 95 - STATE.trainRatio;
      renderLaunchPanel();
    }
  }

  function handleChange(event) {
    if (event.target.id === "epochsInput") {
      STATE.epochs = Math.max(20, Number(event.target.value) || 20);
      renderLaunchPanel();
      return;
    }

    if (event.target.id === "batchInput") {
      STATE.batch = Math.max(4, Number(event.target.value) || 4);
      renderLaunchPanel();
      return;
    }

    if (event.target.id === "imgszSelect") {
      STATE.imgsz = Number(event.target.value);
      renderLaunchPanel();
      return;
    }

    if (event.target.id === "deviceSelect") {
      STATE.device = event.target.value;
      renderLaunchPanel();
    }
  }

  document.addEventListener("click", handleClick);
  document.addEventListener("input", handleInput);
  document.addEventListener("change", handleChange);

  renderAll();
  startAutoplayIfNeeded();
</script>
</body>
</html>
