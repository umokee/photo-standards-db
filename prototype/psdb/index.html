<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PSdb — Стандарты</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;500;600;700&family=Barlow:wght@400;500&family=DM+Mono:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<nav class="nav">
  <div class="nav-logo">PS<span>db</span></div>
  <div class="nav-tabs">
    <a class="nav-tab active" href="index.html">Стандарты</a>
    <a class="nav-tab" href="models.html">Модели</a>
    <a class="nav-tab" href="#">Инспекции</a>
    <a class="nav-tab" href="#">Камеры</a>
  </div>
  <div class="nav-spacer"></div>
  <div class="nav-user">
    <div class="nav-avatar">АД</div>
    <span>Администратор</span>
  </div>
</nav>

<div class="app">

  <!-- Col 1: Groups -->
  <aside class="col col--groups">
    <div class="col-header">
      <span class="col-title">Группы</span>
      <button class="btn-icon" onclick="openModal('group-modal')" title="Добавить группу">
        <svg width="14" height="14" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      </button>
    </div>
    <div class="groups-list" id="groups-list"></div>
  </aside>

  <!-- Col 2: Standards -->
  <aside class="col col--standards">
    <div class="col-header">
      <span class="col-title" id="standards-title">Стандарты</span>
      <button class="btn-icon" onclick="openModal('standard-modal')" title="Добавить стандарт">
        <svg width="14" height="14" viewBox="0 0 14 14"><line x1="7" y1="1" x2="7" y2="13"/><line x1="1" y1="7" x2="13" y2="7"/></svg>
      </button>
    </div>
    <div class="standards-list" id="standards-list">
      <div class="empty-hint">← выберите группу</div>
    </div>
  </aside>

  <!-- Col 3: Detail -->
  <main class="col col--detail" id="col-detail">
    <div class="empty-state">
      <div class="empty-state__icon">
        <svg width="48" height="48" viewBox="0 0 48 48" fill="none" stroke="currentColor" stroke-width="1.2">
          <rect x="6" y="10" width="36" height="28" rx="2"/>
          <circle cx="18" cy="22" r="5"/>
          <path d="M6 32l10-8 8 6 6-5 12 9"/>
        </svg>
      </div>
      <div class="empty-state__text">Выберите стандарт</div>
    </div>
  </main>

</div>

<!-- Modal: New Group -->
<div class="modal-backdrop" id="group-modal">
  <div class="modal">
    <div class="modal-title">Новая группа</div>
    <label class="form-label">Название</label>
    <input class="form-input" id="new-group-name" type="text" placeholder="Например: Корпус A7">
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="closeModal('group-modal')">Отмена</button>
      <button class="btn btn--primary" onclick="createGroup()">Создать</button>
    </div>
  </div>
</div>

<!-- Modal: New Standard -->
<div class="modal-backdrop" id="standard-modal">
  <div class="modal">
    <div class="modal-title">Новый стандарт</div>
    <label class="form-label">Название</label>
    <input class="form-input" id="new-std-name" type="text" placeholder="Например: Передняя панель">
    <label class="form-label" style="margin-top:14px">Ракурс</label>
    <select class="form-select" id="new-std-angle">
      <option value="FRONT">Фронт</option>
      <option value="TOP">Верх</option>
      <option value="LEFT">Левый бок</option>
      <option value="RIGHT">Правый бок</option>
      <option value="BACK">Зад</option>
    </select>
    <div class="modal-footer">
      <button class="btn btn--ghost" onclick="closeModal('standard-modal')">Отмена</button>
      <button class="btn btn--primary" onclick="createStandard()">Создать</button>
    </div>
  </div>
</div>

<script src="data.js"></script>
<script src="groups.js"></script>
<script src="standards.js"></script>
<script src="detail.js"></script>
<script src="app.js"></script>
</body>
</html>
