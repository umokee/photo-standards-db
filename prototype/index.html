<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Прототип — Photo Standards DB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'IBM Plex Sans', sans-serif;
      background: #0b0d0a; color: #dce0d4;
      height: 100vh; display: flex; align-items: center; justify-content: center;
    }
    .wrapper { text-align: center; max-width: 500px; padding: 40px 20px; }
    .logo {
      width: 48px; height: 48px; background: #3d9e72; border-radius: 10px;
      display: flex; align-items: center; justify-content: center; margin: 0 auto 20px;
    }
    .logo svg { width: 28px; height: 28px; fill: none; stroke: #fff; stroke-width: 2; }
    h1 { font-size: 22px; font-weight: 600; margin-bottom: 6px; letter-spacing: -0.3px; }
    .sub { font-size: 13px; color: #546050; margin-bottom: 32px; }
    .pages { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    a.page-link {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 14px; border-radius: 8px;
      background: #161a15; border: 1px solid #2b3327;
      color: #8a9280; text-decoration: none;
      font-size: 13px; transition: all 0.15s;
    }
    a.page-link:hover { background: #1f2620; color: #dce0d4; border-color: #3d9e72; }
    a.page-link.featured { grid-column: span 2; background: rgba(61,158,114,0.08); border-color: rgba(61,158,114,0.25); color: #5bbf8a; }
    a.page-link.featured:hover { background: rgba(61,158,114,0.14); }
    a.page-link svg { width: 16px; height: 16px; stroke-width: 1.5; flex-shrink: 0; }
    .page-link__tag { margin-left: auto; font-size: 10px; font-family: 'IBM Plex Mono', monospace; color: #3d9e72; background: rgba(61,158,114,0.1); padding: 2px 6px; border-radius: 3px; }
    .note { margin-top: 24px; font-size: 11px; font-family: 'IBM Plex Mono', monospace; color: #546050; }
  </style>
</head>
